# DIY Numpad - ZMK Config
# Board: Pro Micro NRF52840 (nice!nano v2 compatible)

# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_DEVICE_NAME="DIY Numpad"
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# USB (vừa BLE vừa USB cùng lúc)
CONFIG_ZMK_USB=y

# Sleep / Power saving
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
